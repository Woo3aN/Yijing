name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取所有 tag（含 annotated tag 消息体）
        run: git fetch --tags --force

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install ttkbootstrap openai pyinstaller

      - name: 构建 exe
        run: pyinstaller --noconfirm 易经占卜.spec

      - name: 验证产物
        run: dir dist\

      - name: 提取 tag 说明
        run: |
          $tag = '${{ github.ref_name }}'
          git for-each-ref --format='%(contents)' "refs/tags/$tag" > release_notes.md
          Write-Host "Notes preview:"
          Get-Content release_notes.md | Select-Object -First 3

      - name: 清理 Draft Release
        run: |
          # 删除所有草稿 Release（不管有没有，不报错）
          $drafts = gh release list --limit 50 --json tagName,isDraft --jq '.[] | select(.isDraft) | .tagName' 2>$null
          if ($drafts) {
            $drafts | ForEach-Object {
              gh release delete $_ --yes --cleanup-tag 2>$null
              Write-Host "Deleted draft: $_"
            }
          } else {
            Write-Host "No draft releases found"
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 Release 并上传
        run: |
          # 先删旧 Release（如果存在），避免 "already exists" 冲突
          gh release delete ${{ github.ref_name }} --yes --cleanup-tag 2>$null
          Write-Host "创建新 Release..."
          gh release create ${{ github.ref_name }} `
            --title "易经占卜 ${{ github.ref_name }}" `
            --notes-file release_notes.md `
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理中间版本 Release
        run: |
          $old = @("v1.0.3", "v1.0.4", "v1.0.5", "v1.0.6", "v1.0.7", "v1.0.8")
          foreach ($t in $old) {
            $exists = gh release view $t 2>$null
            if ($LASTEXITCODE -eq 0) {
              gh release delete $t --yes --cleanup-tag 2>$null
              Write-Host "Deleted $t"
            } else {
              Write-Host "Skip $t (not found)"
            }
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
