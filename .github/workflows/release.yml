name: Build and Release

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.3 等 tag 时触发
  workflow_dispatch:    # 也支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install ttkbootstrap openai pyinstaller

      - name: 构建 exe
        run: pyinstaller --noconfirm 易经占卜.spec

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - 易经占卜
          files: dist/易经占卜.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
