name: Build and Release

on:
  push:
    tags:
      - 'v*'              # 推送 v1.0.3 等 tag 时自动触发
  workflow_dispatch:       # 也支持在 Actions 页面手动触发

permissions:
  contents: write          # 必须：允许创建 Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install ttkbootstrap openai pyinstaller

      - name: 构建 exe
        run: pyinstaller --noconfirm 易经占卜.spec

      - name: 验证产物
        run: dir dist\

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - 易经占卜
          files: dist/*.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
