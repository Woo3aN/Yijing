name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install ttkbootstrap openai pyinstaller

      - name: 构建 exe
        run: pyinstaller --noconfirm 易经占卜.spec

      - name: 验证产物
        run: dir dist\

      - name: 创建 Release 并上传
        run: |
          $tag = '${{ github.ref_name }}'
          $body = (git tag -l --format='%(contents)' $tag) -join "`n"
          gh release create $tag `
            --title "$tag - 易经占卜" `
            --notes "$body" `
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
