name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 拉取全部历史，gh 需要用来生成 changelog

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install ttkbootstrap openai pyinstaller

      - name: 构建 exe
        run: pyinstaller --noconfirm 易经占卜.spec

      - name: 验证产物
        run: dir dist\

      - name: 创建 Release 并上传
        run: |
          gh release create ${{ github.ref_name }} `
            --title "${{ github.ref_name }} - 易经占卜" `
            --generate-notes `
            --notes-start-tag `git describe --tags --abbrev=0 HEAD^ 2>$null || echo ""` `
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
