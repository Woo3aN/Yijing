name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 拉取所有 tag（含 annotated tag 消息体）
        run: git fetch --tags --force

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install ttkbootstrap openai pyinstaller

      - name: 构建 exe
        run: pyinstaller --noconfirm 易经占卜.spec

      - name: 验证产物
        run: dir dist\

      - name: 提取 tag 说明
        run: |
          $tag = '${{ github.ref_name }}'
          git for-each-ref --format='%(contents)' "refs/tags/$tag" > release_notes.md
          Write-Host "Notes preview:"
          Get-Content release_notes.md | Select-Object -First 3

      - name: 创建 Release 并上传
        run: |
          gh release create ${{ github.ref_name }} `
            --title "${{ github.ref_name }} - 易经占卜" `
            --notes-file release_notes.md `
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
